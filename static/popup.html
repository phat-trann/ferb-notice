<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FerbNotice Setup</title>
    <style>
      :root {
        color: #102019;
        background: #fff7ed;
        font-family: "Noto Sans", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 360px;
        margin: 0;
        background:
          radial-gradient(circle at 12% 0%, rgba(251, 146, 60, 0.32), transparent 34%),
          linear-gradient(145deg, #fff7ed 0%, #fef3c7 42%, #d1fae5 100%);
      }

      .shell {
        padding: 18px;
      }

      .panel {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.74);
        border-radius: 28px;
        padding: 22px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow:
          0 24px 70px rgba(15, 23, 42, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.78);
      }

      .panel::after {
        content: "";
        position: absolute;
        right: -58px;
        top: -58px;
        width: 150px;
        height: 150px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(20, 184, 166, 0.28), transparent 68%);
      }

      .brand {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand-copy {
        display: grid;
        grid-template-columns: 42px 1fr;
        align-items: center;
        gap: 12px;
      }

      .brand-logo {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        box-shadow: 0 14px 30px rgba(15, 118, 110, 0.2);
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.16em;
        color: #c2410c;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1;
        letter-spacing: -0.06em;
      }

      .credit {
        margin: 8px 0 0;
        font-size: 12px;
        font-weight: 700;
        color: rgba(15, 23, 42, 0.58);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .switch {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .switch input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .switch span {
        width: 58px;
        height: 34px;
        border-radius: 999px;
        background: #94a3b8;
        box-shadow: inset 0 2px 6px rgba(15, 23, 42, 0.18);
        transition: background 160ms ease;
      }

      .switch span::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        width: 26px;
        height: 26px;
        border-radius: 999px;
        background: #fff7ed;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
        transition: transform 160ms ease;
      }

      .switch input:checked + span {
        background: #0f766e;
      }

      .switch input:checked + span::after {
        transform: translateX(24px);
      }

      form {
        position: relative;
        display: grid;
        gap: 14px;
        margin-top: 22px;
      }

      label {
        display: grid;
        gap: 7px;
        font-size: 12px;
        font-weight: 800;
        color: rgba(15, 23, 42, 0.72);
        letter-spacing: 0.02em;
      }

      input,
      select {
        width: 100%;
        height: 46px;
        border: 1px solid rgba(148, 163, 184, 0.36);
        border-radius: 16px;
        padding: 0 14px;
        color: #102019;
        background: rgba(255, 255, 255, 0.82);
        font: inherit;
        font-size: 15px;
        font-weight: 700;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: #0f766e;
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.14);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .divider {
        height: 1px;
        margin: 4px 0;
        background: linear-gradient(90deg, transparent, rgba(15, 118, 110, 0.28), transparent);
      }

      .note {
        margin: -5px 0 0;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.45;
        color: rgba(15, 23, 42, 0.62);
      }

      button {
        height: 48px;
        border: none;
        border-radius: 17px;
        color: #fff7ed;
        background: linear-gradient(135deg, #0f766e, #14b8a6);
        box-shadow: 0 18px 34px rgba(15, 118, 110, 0.28);
        font: inherit;
        font-size: 14px;
        font-weight: 900;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.72;
        cursor: default;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .danger-button {
        color: #fff7ed;
        background: linear-gradient(135deg, #b91c1c, #ef4444);
        box-shadow: 0 18px 34px rgba(185, 28, 28, 0.24);
      }

      .status {
        min-height: 18px;
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        color: rgba(15, 23, 42, 0.62);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel" aria-label="FerbNotice setup">
        <div class="brand">
          <div class="brand-copy">
            <img class="brand-logo" src="icons/icon-128.png" width="42" height="42" alt="" aria-hidden="true">
            <div>
              <p class="eyebrow">Setup</p>
              <h1>FerbNotice</h1>
              <p class="credit">Made by Ferb</p>
            </div>
          </div>
          <label class="switch" title="Bật hoặc tắt FerbNotice">
            <input id="enabled" type="checkbox">
            <span aria-hidden="true"></span>
          </label>
        </div>

        <form id="settings-form">
          <label>
            Giờ vào muộn nhất
            <input id="latest-checkin-time" type="time" required>
          </label>

          <div class="grid">
            <label>
              Duration (giờ)
              <input id="work-duration-hours" type="number" min="0.5" max="24" step="0.25" required>
            </label>

            <label>
              Làm tròn
              <select id="rounding-slot-minutes">
                <option value="15">15 phút</option>
                <option value="30">30 phút</option>
                <option value="60">60 phút</option>
              </select>
            </label>
          </div>

          <div class="divider" aria-hidden="true"></div>

          <label>
            Giờ check-in hôm nay
            <input id="today-checkin-time" type="time">
          </label>
          <p id="today-checkin-note" class="note">Chưa có dữ liệu check-in hôm nay.</p>

          <div class="button-row">
            <button id="save-button" type="submit">Lưu setup</button>
            <button id="clear-today-button" class="danger-button" type="button">Xóa hôm nay</button>
          </div>
          <p id="status" class="status" role="status"></p>
        </form>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
